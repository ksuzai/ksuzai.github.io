<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Оформление вертикального меню</title>
	<style>
		.menu {
			width: 200px;
			background: #3b6ea5;
		}
		
		.menu ul {
			list-style: none;
			margin: 0;
			padding: 5px 10px;
		}
		
		.menu li {
			padding: 5px 0;
		}
		
		.menu li a {
			display: block;
			padding: 10px;
			text-transform: uppercase;
			text-decoration: none;
			background: #ffffff;
			color: #3b6ea5;
			font-family: Arial, sans-serif;
		}
		
		.menu li a:hover {
			background: #dedea8;
			color: #000;
		}
	</style>
</head>
<body>

<nav class="menu">
	<ul>
		<li><a href="#">Фильмы</a></li>
		<li><a href="#">Музыка</a></li>
		<li><a href="#">Софт</a></li>
		<li><a href="#">Игры</a></li>
	</ul>
</nav>

</body>
</html>
